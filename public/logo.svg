<svg width="196" height="48" viewBox="0 0 196 48" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Lucro Oculto">
  <defs>
    <clipPath id="lensClip">
      <circle cx="20" cy="21" r="11"/>
    </clipPath>
    <linearGradient id="barGrad" x1="20" y1="32" x2="20" y2="10" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#006640"/>
      <stop offset="100%" stop-color="#00FF99"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Icon background -->
  <rect width="48" height="48" rx="12" fill="#0D0F14"/>
  <rect width="48" height="48" rx="12" fill="none" stroke="#00D084" stroke-opacity="0.22" stroke-width="1"/>

  <!-- Lens dark bg -->
  <circle cx="20" cy="21" r="11" fill="#07090E"/>

  <!-- Bar chart clipped to lens -->
  <g clip-path="url(#lensClip)">
    <rect x="13" y="22" width="3.5" height="22" rx="1" fill="url(#barGrad)" opacity="0.40"/>
    <rect x="18.25" y="17" width="3.5" height="27" rx="1" fill="url(#barGrad)" opacity="0.68"/>
    <rect x="23.5" y="12" width="3.5" height="32" rx="1" fill="url(#barGrad)"/>
  </g>

  <!-- Lens ring -->
  <circle cx="20" cy="21" r="11" fill="none" stroke="#00D084" stroke-width="1.8" filter="url(#glow)"/>

  <!-- Magnifying glass handle -->
  <line x1="28.5" y1="29.5" x2="36.5" y2="37.5" stroke="#00D084" stroke-width="2.4" stroke-linecap="round"/>

  <!-- Wordmark -->
  <text x="58" y="31" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="20" font-weight="700" letter-spacing="-0.3">
    <tspan fill="#F4F4F5">Lucro </tspan><tspan fill="#00D084">Oculto</tspan>
  </text>
</svg>
